<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TokenFit</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-band" aria-labelledby="app-title">
        <p class="eyebrow">TokenFit</p>
        <h1 id="app-title">Your AI thinks. You rep.</h1>
        <div class="language-toggle" aria-label="Language">
          <button id="lang-en" class="language-button is-active" type="button">EN</button>
          <button id="lang-ja" class="language-button" type="button">日本語</button>
        </div>
      </section>

      <section class="workout-grid">
        <article class="current-panel" aria-live="polite">
          <div id="empty-state" class="empty-state">
            <p class="status-copy">Waiting for a hook.</p>
            <button id="manual-trigger" class="secondary-button" type="button">Test Hook</button>
          </div>
          <div id="challenge-card" class="challenge-card is-hidden">
            <h2 id="challenge-name">Desk plank</h2>
            <div class="rep-meter">
              <span id="challenge-amount">20</span>
              <small id="challenge-unit">seconds</small>
            </div>
            <p id="challenge-cue" class="cue">Forearms on desk, ribs down.</p>
            <div class="exercise-detail">
              <ol id="challenge-steps"></ol>
            </div>
            <div class="action-row">
              <button id="done-button" class="done-button" type="button">Done</button>
              <button id="skip-button" class="quiet-button" type="button">Skip</button>
            </div>
          </div>
        </article>

        <aside class="side-panel" aria-label="Progress">
          <div class="rep-stack-stage" aria-label="Rep garden">
            <div class="rep-garden" aria-hidden="true">
              <div id="stack-meter" class="stack-meter"></div>
            </div>
          </div>

          <div class="daily-summary" aria-label="Today">
            <div class="daily-stats">
              <div>
                <span id="today-count">0</span>
                <small data-i18n="todayLabel">today</small>
              </div>
              <div>
                <span id="streak-count">0</span>
                <small data-i18n="streakLabel">streak</small>
              </div>
            </div>
            <ol id="today-list" class="today-list"></ol>
          </div>

          <a id="share-x" class="share-button" href="https://twitter.com/intent/tweet" target="_blank" rel="noopener noreferrer">Post to X</a>
        </aside>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
